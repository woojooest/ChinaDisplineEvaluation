<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>University & Discipline Rankings — StudyChina</title>
<style>
  :root {
    --bg: #faf8f3; --card: #fff; --ink: #1a1a1a; --muted: #6b6b6b;
    --line: #ece8df; --crimson: #c0142c; --gold: #b8860b; --blue: #1d4ed8;
    --qs-accent: #005eb8; --usnews-accent: #0f766e; --cde-accent: #c0142c;
    --accent: var(--qs-accent);
    --serif: Georgia, "Times New Roman", "Songti SC", serif;
    --sans: -apple-system, "Segoe UI", "PingFang SC", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { font-family: var(--sans); color: var(--ink); background: var(--bg); }

  /* theme accent follows the active source */
  body.src-qs     { --accent: var(--qs-accent); }
  body.src-usnews { --accent: var(--usnews-accent); }
  body.src-cde    { --accent: var(--cde-accent); }

  /* ── Header ── */
  header {
    background: #fff; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 14px;
    padding: 14px 32px; position: sticky; top: 0; z-index: 20;
  }
  .logo { font-family: var(--serif); font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
  .logo .dot { width: 26px; height: 26px; border-radius: 50%; border: 3px solid var(--crimson); position: relative; }
  .logo .dot::after { content: ""; position: absolute; inset: 4px; border-radius: 50%; border: 1.5px solid var(--crimson); }
  .logo b { font-weight: 800; }

  /* ── Primary board tabs ── */
  .board-tabs { margin-left: auto; display: flex; gap: 4px; }
  .board-tabs button {
    border: none; background: none; cursor: pointer; font: inherit;
    font-size: .9rem; font-weight: 700; padding: 9px 4px; margin: 0 12px;
    color: var(--muted); letter-spacing: .01em; position: relative; transition: color .15s;
  }
  .board-tabs button::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -15px; height: 3px;
    background: var(--accent); border-radius: 3px 3px 0 0; transform: scaleX(0); transition: transform .18s;
  }
  .board-tabs button.active { color: var(--ink); }
  .board-tabs button.active::after { transform: scaleX(1); }

  /* ── Intro ── */
  .intro { max-width: 1180px; margin: 30px auto 4px; padding: 0 32px; transition: all .2s; }
  .eyebrow {
    display: flex; align-items: center; gap: 14px; font-weight: 700;
    letter-spacing: .12em; font-size: .82rem; text-transform: uppercase; color: var(--ink);
  }
  .eyebrow::before { content: ""; width: 46px; height: 2px; background: var(--accent); }
  .intro h1 { font-family: var(--serif); font-size: 2rem; margin: 14px 0 0; }
  .intro p { color: var(--muted); max-width: 760px; line-height: 1.5; }

  /* ── Control bar (source + year) ── */
  .ctrlbar {
    max-width: 1180px; margin: 16px auto 0; padding: 0 32px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .seg { display: flex; background: #f3f0e9; border-radius: 10px; padding: 4px; gap: 4px; }
  .seg > .seg-label {
    font-size: .68rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    color: #aaa397; align-self: center; padding: 0 8px 0 6px;
  }
  .seg button {
    border: none; background: none; cursor: pointer; font: inherit;
    font-size: .82rem; font-weight: 700; padding: 7px 16px; border-radius: 7px;
    color: var(--muted); transition: all .15s;
  }
  .seg button:disabled { cursor: default; opacity: .55; }
  .seg button.active { background: #fff; color: var(--accent); box-shadow: 0 1px 4px rgba(0,0,0,.1); }
  .spacer { margin-left: auto; }

  .btn-detail-toggle {
    border: 1px solid var(--line); background: #fff; cursor: pointer;
    font: inherit; font-size: .78rem; font-weight: 600; color: var(--muted);
    padding: 7px 14px; border-radius: 8px; transition: all .15s;
  }
  .btn-detail-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .btn-detail-toggle.on { background: #eef3fc; border-color: var(--accent); color: var(--accent); }

  /* ── University board ── */
  #university-view { max-width: 1180px; margin: 16px auto 0; padding: 0 32px; transition: max-width .25s ease; }
  body.uni-details #university-view { max-width: min(1640px, calc(100vw - 48px)); }
  #university-view .ctrlbar { max-width: none; padding: 0; margin: 16px 0 0; }
  #university-view .source-note { max-width: none; padding-left: 0; padding-right: 0; }
  #uni-panel { padding: 22px 26px 26px; margin-top: 16px; }
  .uni-rankcol { width: 96px; }

  /* ── Subject board layout ── */
  .wrap {
    max-width: 1180px; margin: 18px auto 60px; padding: 0 32px;
    display: grid; grid-template-columns: 230px 320px 1fr; gap: 24px; align-items: start;
    transition: max-width .25s ease, grid-template-columns .25s ease;
  }
  body.qs-details .wrap {
    max-width: min(1640px, calc(100vw - 48px));
    grid-template-columns: 190px 240px 1fr;
  }
  @media (max-width: 900px) {
    .wrap, body.qs-details .wrap { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04); overflow: hidden;
  }
  .panel h3 {
    font-size: .72rem; letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted); margin: 0; padding: 16px 18px 10px;
  }

  /* ── Category nav ── */
  .nav-list button {
    display: block; width: 100%; text-align: left; border: 0; background: none;
    cursor: pointer; font: inherit; font-weight: 600; padding: 13px 18px;
    color: var(--ink); border-left: 3px solid transparent;
  }
  .nav-list button:hover { background: #faf8f3; }
  .nav-list button[aria-selected="true"] { color: var(--accent); border-left-color: var(--accent); background: #eef3fc; }
  body.src-cde .nav-list button[aria-selected="true"] { background: #fdf4f5; }
  .nav-list .subj-count { font-size: .75rem; font-weight: 400; color: var(--muted); margin-left: 6px; }

  /* ── Subject list ── */
  .subj-list { max-height: 72vh; overflow-y: auto; }
  .subj-list button {
    display: block; width: 100%; text-align: left; border: 0; background: none;
    cursor: pointer; font: inherit; padding: 12px 18px; color: #333;
    border-bottom: 1px solid #f3f0e9;
  }
  .subj-list button .code { color: var(--muted); font-variant-numeric: tabular-nums; margin-right: 8px; font-size: .8rem; }
  .subj-list button:hover { background: #faf8f3; }
  .subj-list button[aria-selected="true"] { background: #eef3fc; color: var(--accent); font-weight: 600; }
  body.src-cde .subj-list button[aria-selected="true"] { background: #fdf4f5; }
  .subj-list .cnt { color: var(--muted); font-size: .75rem; margin-left: 5px; }

  /* ── Detail panel ── */
  .detail { padding: 26px 30px 30px; }
  .detail .loc {
    display: flex; align-items: center; gap: 7px; color: var(--accent);
    font-weight: 700; letter-spacing: .06em; font-size: .78rem; text-transform: uppercase;
  }
  .detail h2 { font-family: var(--serif); font-size: 1.9rem; margin: 8px 0 2px; }
  .detail .count { color: var(--muted); margin: 6px 0 22px; font-size: .88rem; }
  .placeholder { color: var(--muted); padding: 50px 4px; text-align: center; }

  /* ── tables ── */
  table { border-collapse: collapse; width: 100%; }
  thead th {
    text-align: left; padding: 10px 14px; font-size: .72rem; letter-spacing: .1em;
    text-transform: uppercase; color: var(--muted); border-bottom: 2px solid var(--line);
  }
  thead th.center { text-align: center; }
  thead th.right  { text-align: right; }
  tbody tr { border-bottom: 1px solid #f3f0e9; }
  td { padding: 11px 14px; vertical-align: middle; }
  td.grade { text-align: center; }
  td.rank  { text-align: center; font-variant-numeric: tabular-nums; font-weight: 700; color: var(--ink); min-width: 56px; }
  td.rank span.delta { font-size: .75rem; margin-left: 4px; font-weight: 400; }
  td.rank span.up   { color: #16a34a; }
  td.rank span.down { color: var(--crimson); }
  td.rank span.same { color: var(--muted); }
  td.code-col { width: 84px; color: var(--muted); font-variant-numeric: tabular-nums; }
  td.inst { font-family: var(--serif); font-size: 1.02rem; }
  td.inst small { display: block; font-family: var(--sans); font-size: .76rem; color: var(--muted); margin-top: 2px; }
  td.score { text-align: right; font-variant-numeric: tabular-nums; color: var(--muted); font-size: .88rem; padding-right: 18px; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; color: var(--muted); font-size: .88rem; }

  .pill {
    display: inline-block; min-width: 46px; text-align: center;
    padding: 5px 12px; border-radius: 999px; font-weight: 700;
    font-size: .95rem; border: 1px solid;
  }
  .pill.A { color: var(--crimson); border-color: var(--crimson); background: #fdf4f5; }
  .pill.B { color: #1d4ed8; border-color: #c7d4f7; background: #f3f6ff; }
  .pill.C { color: var(--gold); border-color: #eadfc0; background: #fbf6e9; }

  .score-bar { display: inline-block; height: 6px; border-radius: 3px; background: var(--accent); opacity: .6; vertical-align: middle; margin-left: 6px; }

  .faculty-note {
    display: inline-block; background: #eef3fc; color: var(--accent);
    font-size: .78rem; font-weight: 700; padding: 4px 12px; border-radius: 6px;
    margin-bottom: 18px;
  }

  .table-scroll { overflow-x: auto; }
  th.score-detail { text-align: right; padding: 10px 14px; white-space: nowrap;
    font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; }
  td.score-detail { text-align: right; vertical-align: middle; padding: 11px 14px;
    font-variant-numeric: tabular-nums; color: var(--muted); font-size: .88rem; white-space: nowrap; }
  td.score-detail .score-bar { background: #b9c6dd; }
  td.score.est { color: #9aa3b2; font-style: italic; }
  td.score.est .score-bar { opacity: .4; background-image: repeating-linear-gradient(90deg, #b9c6dd 0 3px, transparent 3px 5px); }
  .est-note { margin: -6px 0 16px; font-size: .76rem; color: var(--muted); line-height: 1.5; }

  .endpoint-tag {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .72rem;
    color: #9b9488; background: #f3f0e9; padding: 3px 9px; border-radius: 6px;
  }

  .source-note {
    max-width: 1180px; margin: 26px auto 60px; padding: 18px 32px 0;
    color: var(--muted); font-size: .82rem; line-height: 1.55; border-top: 1px solid var(--line);
  }
  .source-note strong { color: #444; font-weight: 600; }
</style>
</head>
<body class="src-qs">
<header>
  <div class="logo"><span class="dot"></span><span><b>Study</b>China<span style="color:var(--crimson)">.</span></span></div>
  <div class="board-tabs" id="board-tabs"></div>
</header>

<div class="intro">
  <div class="eyebrow" id="eyebrow">—</div>
  <h1 id="main-title">Rankings</h1>
  <p id="main-desc"></p>
</div>

<!-- ════════════ UNIVERSITY BOARD ════════════ -->
<div id="university-view" hidden>
  <div class="ctrlbar">
    <div class="seg" id="uni-source"></div>
    <div class="seg" id="uni-year"></div>
    <div class="spacer"></div>
    <span class="endpoint-tag" id="uni-endpoint"></span>
    <button class="btn-detail-toggle" id="btn-uni-detail" hidden>▼ Show Score Details</button>
  </div>
  <div class="panel detail" id="uni-panel"><p class="placeholder">Loading…</p></div>
  <div class="source-note" id="uni-note"></div>
</div>

<!-- ════════════ SUBJECT BOARD ════════════ -->
<div id="subject-view" hidden>
  <div class="ctrlbar">
    <div class="seg" id="subj-source"></div>
    <div class="seg" id="subj-year"></div>
    <div class="spacer"></div>
    <span class="endpoint-tag" id="subj-endpoint"></span>
  </div>
  <div class="wrap">
    <div class="panel"><h3 id="col1-label">Category</h3><div class="nav-list" id="nav"></div></div>
    <div class="panel"><h3 id="col2-label">Discipline</h3><div class="subj-list" id="subjects"></div></div>
    <div class="panel detail" id="detail"><p class="placeholder" id="status">Loading…</p></div>
  </div>
  <div class="source-note" id="subj-note"></div>
</div>

<script>
// ═══════════════════════ State & config ═══════════════════════
let MANIFEST = null;
let BOARD = 'university';
const SEL = {                                  // current source/year per board
  university: { source: 'qs', year: null },
  subject:    { source: 'cde', year: null },
};
const CACHE = {};                              // url -> parsed JSON
let showScores = false;          // global: "Show Score Details" toggle (shared across boards/sources)
let _subjectRerender = null;     // re-renders the current subject detail when scores toggle

// Each distinct dataset has its OWN url endpoint.
function datasetUrl(board, source, year) {
  if (board === 'university') return `./data/university/${source}/${year}.json`;
  return `./data/subject/${source}/index.json`;             // subject sources are single-file
}

async function loadJSON(url) {
  if (CACHE[url]) return CACHE[url];
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${url} → ${r.status}`);
  return (CACHE[url] = await r.json());
}

const $ = id => document.getElementById(id);

// ═══════════════════════ Boot ═══════════════════════
(async function init() {
  try {
    MANIFEST = await loadJSON('./data/manifest.json');
  } catch (e) {
    document.body.innerHTML = '<p style="padding:40px">Failed to load manifest: ' + e.message + '</p>';
    return;
  }
  // defaults from manifest
  for (const b of ['university', 'subject']) {
    const bd = MANIFEST.boards[b];
    SEL[b].source = bd.default_source;
    SEL[b].year   = bd.sources[bd.default_source].default_year;
  }
  buildBoardTabs();
  applyRoute(parseHash());
  window.addEventListener('hashchange', () => applyRoute(parseHash()));
})();

// ── URL hash routing: #board/source/year ──
function parseHash() {
  const m = (location.hash || '').replace(/^#/, '').split('/').filter(Boolean);
  if (!m.length) return null;
  const [board, source, year] = m;
  if (!MANIFEST.boards[board]) return null;
  const bd = MANIFEST.boards[board];
  const src = bd.sources[source] ? source : bd.default_source;
  const yr  = (bd.sources[src].years || []).includes(year) ? year : bd.sources[src].default_year;
  return { board, source: src, year: yr };
}
function writeHash() {
  const s = SEL[BOARD];
  location.hash = `${BOARD}/${s.source}/${s.year}`;
}
function applyRoute(route) {
  if (route) {
    BOARD = route.board;
    SEL[BOARD].source = route.source;
    SEL[BOARD].year   = route.year;
  }
  render();
}

// ═══════════════════════ Chrome (tabs / segs) ═══════════════════════
function buildBoardTabs() {
  const wrap = $('board-tabs');
  wrap.innerHTML = Object.entries(MANIFEST.boards)
    .map(([key, b]) => `<button data-board="${key}">${b.label}</button>`).join('');
  wrap.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
    BOARD = btn.dataset.board;
    writeHash(); render();
  }));
}

function buildSourceSeg(elId, board) {
  const bd = MANIFEST.boards[board];
  const cur = SEL[board].source;
  $(elId).innerHTML = '<span class="seg-label">Source</span>' +
    Object.entries(bd.sources).map(([key, s]) =>
      `<button data-source="${key}" class="${key === cur ? 'active' : ''}">${s.label}</button>`).join('');
  $(elId).querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
    const src = btn.dataset.source;
    SEL[board].source = src;
    SEL[board].year   = bd.sources[src].default_year;   // reset year on source change
    writeHash(); render();
  }));
}

function buildYearSeg(elId, board) {
  const bd = MANIFEST.boards[board];
  const src = SEL[board].source;
  const years = bd.sources[src].years || [];
  const cur = SEL[board].year;
  const single = years.length <= 1;
  $(elId).innerHTML = '<span class="seg-label">Year</span>' +
    years.map(y => `<button data-year="${y}" class="${y === cur ? 'active' : ''}"` +
      `${single ? ' disabled' : ''}>${y}</button>`).join('');
  if (single) return;
  $(elId).querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
    SEL[board].year = btn.dataset.year;
    writeHash(); render();
  }));
}

// ═══════════════════════ Render dispatch ═══════════════════════
function render() {
  const src = SEL[BOARD].source;
  document.body.className = 'src-' + src;
  // Widen the page only when many indicator columns are revealed (QS sources).
  document.body.classList.toggle('uni-details', BOARD === 'university' && showScores && src === 'qs');
  document.body.classList.toggle('qs-details',  BOARD === 'subject' && showScores && src === 'qs');

  // active board tab
  $('board-tabs').querySelectorAll('button')
    .forEach(b => b.classList.toggle('active', b.dataset.board === BOARD));

  $('university-view').hidden = BOARD !== 'university';
  $('subject-view').hidden    = BOARD !== 'subject';

  updateIntro();

  if (BOARD === 'university') {
    buildSourceSeg('uni-source', 'university');
    buildYearSeg('uni-year', 'university');
    renderUniversity();
  } else {
    buildSourceSeg('subj-source', 'subject');
    buildYearSeg('subj-year', 'subject');
    renderSubject();
  }
}

function updateIntro() {
  const s = SEL[BOARD], src = s.source, y = s.year;
  const E = (id, t) => { const el = $(id); if (el) el.textContent = t; };
  if (BOARD === 'university') {
    if (src === 'qs') {
      E('eyebrow', `QS World University Rankings · ${y}`);
      E('main-title', 'University Rankings — China (Mainland)');
      E('main-desc', 'QS World University Rankings for mainland China institutions. Pick a year to see the overall standings; toggle Score Details for the underlying indicator scores.');
    } else {
      E('eyebrow', `U.S. News Best Global Universities · 2026–2027`);
      E('main-title', 'University Rankings — China (Mainland)');
      E('main-desc', 'U.S. News & World Report Best Global Universities for mainland China institutions, by overall Global Score.');
    }
  } else {
    if (src === 'cde') {
      E('eyebrow', 'China Discipline Evaluation · 4th Round (2016)');
      E('main-title', 'China Discipline Evaluation (CDE) Results');
      E('main-desc', 'Choose a broad category, then a discipline, to see institutions ranked by their overall result. Schools sharing a grade are sequenced by institution code.');
      E('col1-label', 'Category'); E('col2-label', 'Discipline');
    } else if (src === 'qs') {
      E('eyebrow', 'QS World University Rankings by Subject · 2026');
      E('main-title', 'QS Subject Rankings — China (Mainland)');
      E('main-desc', 'Choose a faculty area, then a subject, to see mainland China institutions in the 2026 QS World University Rankings by Subject.');
      E('col1-label', 'Faculty'); E('col2-label', 'Subject');
    } else {
      E('eyebrow', 'U.S. News Best Global Universities by Subject · 2026–2027');
      E('main-title', 'U.S. News Subject Rankings — China (Mainland)');
      E('main-desc', 'Choose a subject area, then a subject, to see mainland China institutions in the U.S. News subject rankings, by subject score.');
      E('col1-label', 'Area'); E('col2-label', 'Subject');
    }
  }
}

function showEndpoint(elId) {
  const s = SEL[BOARD];
  $(elId).textContent = datasetUrl(BOARD, s.source, s.year);
}

// ═══════════════════════ helpers ═══════════════════════
function scoreBar(val, max) {
  if (val == null) return '';
  const pct = Math.min(Math.round((val / (max || 100)) * 60), 60);
  return `<span class="score-bar" style="width:${pct}px"></span>`;
}
function rankDelta(a, b) {
  const parse = v => { const m = String(v ?? '').match(/(\d+)/); return m ? +m[1] : null; };
  const x = parse(a), y = parse(b);
  if (x === null || y === null) return '';
  const d = y - x;
  if (d > 0) return `<span class="delta up">▲${d}</span>`;
  if (d < 0) return `<span class="delta down">▼${Math.abs(d)}</span>`;
  return `<span class="delta same">—</span>`;
}
function fmt(v, d = 1) { return v == null ? '—' : (+v).toFixed(d); }
function fmtInt(v) { return v == null ? '—' : (+v).toLocaleString(); }

// ═══════════════════════ UNIVERSITY board ═══════════════════════
const QS_UNI_COLS = [
  ['academic', 'Academic'], ['employer', 'Employer'], ['faculty', 'Faculty/Student'],
  ['citations', 'Citations'], ['intl_faculty', "Int'l Faculty"], ['intl_students', "Int'l Students"],
  ['irn', 'IRN'], ['employment', 'Employment'], ['sustainability', 'Sustainability'],
];

async function renderUniversity() {
  const s = SEL.university;
  showEndpoint('uni-endpoint');
  const panel = $('uni-panel');
  panel.innerHTML = '<p class="placeholder">Loading…</p>';
  let data;
  try { data = await loadJSON(datasetUrl('university', s.source, s.year)); }
  catch (e) { panel.innerHTML = `<p class="placeholder">Failed to load: ${e.message}</p>`; return; }

  // Any university dataset with a score (QS overall+indicators, US News Global Score) gets the toggle.
  const hasScores = data.list.some(r => r.overall != null) || (data.indicators || []).length > 0;
  const toggle = $('btn-uni-detail');
  toggle.hidden = !hasScores;
  toggle.textContent = showScores ? '▲ Hide Score Details' : '▼ Show Score Details';
  toggle.classList.toggle('on', showScores);
  if (!toggle.dataset.wired) {
    toggle.dataset.wired = '1';
    toggle.addEventListener('click', () => { showScores = !showScores; render(); });
  }

  $('uni-note').innerHTML = s.source === 'qs'
    ? '<strong>Data source:</strong> QS World University Rankings (2024–2027 editions). Only mainland China institutions are shown. © QS Quacquarelli Symonds. For reference only.'
    : '<strong>Data source:</strong> U.S. News & World Report — Best Global Universities, 2026–2027 edition. Only mainland China institutions are shown. For reference only.';

  if (s.source === 'qs') renderUniQS(data, panel);
  else                   renderUniUSNews(data, panel);
}

function renderUniQS(data, panel) {
  const cols = QS_UNI_COLS.filter(([k]) => (data.indicators || []).includes(k));
  // Scores (indicator columns + Overall) appear only when toggled on.
  const heads = showScores
    ? cols.map(([, l]) => `<th class="score-detail">${l}</th>`).join('') + '<th class="score-detail">Overall</th>'
    : '';
  const body = data.list.map(r => {
    const cells = showScores
      ? cols.map(([k]) => `<td class="score-detail">${fmt(r[k])}${scoreBar(r[k], 100)}</td>`).join('') +
        `<td class="score">${fmt(r.overall)}${scoreBar(r.overall, 100)}</td>`
      : '';
    return `<tr>
      <td class="rank uni-rankcol">#${String(r.rank || '—').replace('=', '')}${rankDelta(r.rank, r.prev_rank)}</td>
      <td class="inst">${r.name}</td>
      ${cells}
    </tr>`;
  }).join('');

  panel.innerHTML = `
    <div class="loc">◆ QS ${data.year} · World University Rankings</div>
    <h2>China (Mainland)</h2>
    <p class="count">${data.count} mainland China institutions · QS ${data.year}</p>
    <div class="table-scroll"><table>
      <thead><tr><th class="center">Rank ${data.year}</th><th>Institution</th>${heads}</tr></thead>
      <tbody>${body}</tbody>
    </table></div>`;
}

function renderUniUSNews(data, panel) {
  // Global Score appears only when toggled on; Enrollment is metadata (always shown).
  const scoreHead = showScores ? '<th class="right">Global Score</th>' : '';
  const body = data.list.map(r => `
    <tr>
      <td class="rank uni-rankcol">#${r.rank}</td>
      <td class="inst">${r.name}${r.city ? `<small>${r.city}</small>` : ''}</td>
      <td class="num">${fmtInt(r.enrollment)}</td>
      ${showScores ? `<td class="score">${fmt(r.overall)}${scoreBar(r.overall, 100)}</td>` : ''}
    </tr>`).join('');
  panel.innerHTML = `
    <div class="loc">◆ U.S. News ${data.edition || data.year} · Best Global Universities</div>
    <h2>China (Mainland)</h2>
    <p class="count">${data.count} mainland China institutions · U.S. News ${data.edition || data.year}</p>
    <div class="table-scroll"><table>
      <thead><tr><th class="center">Global Rank</th><th>Institution</th>
        <th class="right">Enrollment</th>${scoreHead}</tr></thead>
      <tbody>${body}</tbody>
    </table></div>`;
}

// ═══════════════════════ SUBJECT board ═══════════════════════
async function renderSubject() {
  const s = SEL.subject;
  showEndpoint('subj-endpoint');
  $('nav').innerHTML = ''; $('subjects').innerHTML = '';
  $('detail').innerHTML = '<p class="placeholder">Loading…</p>';
  let data;
  try { data = await loadJSON(datasetUrl('subject', s.source, s.year)); }
  catch (e) { $('detail').innerHTML = `<p class="placeholder">Failed to load: ${e.message}</p>`; return; }

  $('subj-note').innerHTML = ({
    cde: '<strong>Data source:</strong> China Discipline Evaluation (CDE) — Fourth Round (2016), conducted by the China Academic Degrees and Graduate Education Development Center (CDGDC). For reference only.',
    qs:  '<strong>Data source:</strong> QS World University Rankings by Subject 2026. Only mainland China institutions are shown. © QS Quacquarelli Symonds. For reference only.',
    usnews: '<strong>Data source:</strong> U.S. News Best Global Universities subject rankings, 2026–2027. Only mainland China institutions are shown. For reference only.',
  })[s.source];

  if (s.source === 'cde')    renderCdeNav(data);
  else if (s.source === 'qs') renderQsNav(data);
  else                        renderUsNav(data);
}

// Shared "Show Score Details" control for subject detail tables (QS faculty/subject, US News).
function scoreToggleBtn() {
  return `<button class="btn-detail-toggle${showScores ? ' on' : ''}" id="btn-score-detail">` +
         `${showScores ? '▲ Hide Score Details' : '▼ Show Score Details'}</button>`;
}
function wireSubjectToggle() {
  const t = $('btn-score-detail');
  if (!t) return;
  t.addEventListener('click', () => {
    showScores = !showScores;
    document.body.classList.toggle('qs-details', showScores && SEL.subject.source === 'qs');
    if (_subjectRerender) _subjectRerender();
  });
}

// ── CDE (China Discipline Evaluation) ──
const GRADE_ORDER = ['A+','A','A-','B+','B','B-','C+','C','C-'];
const gradeRank = g => { const i = GRADE_ORDER.indexOf(g); return i === -1 ? 99 : i; };
const tierClass = g => (g && 'ABC'.includes(g[0])) ? g[0] : '';

function renderCdeNav(CDE) {
  const $nav = $('nav');
  Object.entries(CDE).forEach(([broad, node], i) => {
    const b = document.createElement('button');
    const n = Object.keys(node.subjects || {}).length;
    b.innerHTML = `${node.name_en || node.name_zh || broad}<span class="subj-count">(${n})</span>`;
    b.onclick = () => selectCdeBroad(CDE, broad, b);
    $nav.appendChild(b);
    if (i === 0) selectCdeBroad(CDE, broad, b);
  });
}
function selectCdeBroad(CDE, broad, btn) {
  [...$('nav').children].forEach(c => c.setAttribute('aria-selected', c === btn));
  const $subjects = $('subjects'); $subjects.innerHTML = '';
  const subs = Object.values(CDE[broad].subjects || {})
    .sort((a, b) => (a.secondary_subject_code || '').localeCompare(b.secondary_subject_code || ''));
  for (const s of subs) {
    const b = document.createElement('button');
    b.innerHTML = `<span class="code">${s.secondary_subject_code}</span>${s.name_en || s.name_zh}<span class="cnt">(${(s.list||[]).length})</span>`;
    b.onclick = () => selectCdeSubject(s, b);
    $subjects.appendChild(b);
  }
  $('detail').innerHTML = '<p class="placeholder">Select a discipline to view results.</p>';
}
function selectCdeSubject(s, btn) {
  _subjectRerender = null;   // CDE has no scores, hence no toggle
  [...$('subjects').children].forEach(c => c.setAttribute('aria-selected', c === btn));
  const rows = [...(s.list || [])].sort((a, b) => {
    const d = gradeRank(a.evaluation_result) - gradeRank(b.evaluation_result);
    return d !== 0 ? d : (a.institution_code || '').localeCompare(b.institution_code || '');
  });
  const groups = [];
  for (const r of rows) {
    const last = groups[groups.length - 1];
    if (last && last.grade === r.evaluation_result) last.items.push(r);
    else groups.push({ grade: r.evaluation_result, items: [r] });
  }
  const body = groups.map(g => g.items.map((r, idx) => `
    <tr>
      ${idx === 0 ? `<td class="grade" rowspan="${g.items.length}"><span class="pill ${tierClass(g.grade)}">${g.grade}</span></td>` : ''}
      <td class="code-col">${r.institution_code || ''}</td>
      <td class="inst">${r.institution_name_en || r.institution_name || ''}</td>
    </tr>`).join('')).join('');
  $('detail').innerHTML = `
    <div class="loc">★ ${s.secondary_subject_code} · Overall ranking</div>
    <h2>${s.name_en || s.name_zh}</h2>
    <p class="count">${(s.list||[]).length} institutions evaluated · same grade sequenced by code</p>
    <table><thead><tr><th class="center">Result</th><th colspan="2">Institution</th></tr></thead>
      <tbody>${body}</tbody></table>`;
}

// ── QS subject ──
function renderQsNav(QS) {
  const $nav = $('nav');
  Object.entries(QS).forEach(([fcode, fdata], i) => {
    const b = document.createElement('button');
    const n = Object.keys(fdata.subjects || {}).length;
    b.innerHTML = `${fdata.name_en}<span class="subj-count">(${n})</span>`;
    b.onclick = () => selectQsFaculty(fcode, fdata, b);
    $nav.appendChild(b);
    if (i === 0) selectQsFaculty(fcode, fdata, b);
  });
}
function selectQsFaculty(fcode, fdata, btn) {
  [...$('nav').children].forEach(c => c.setAttribute('aria-selected', c === btn));
  const $subjects = $('subjects'); $subjects.innerHTML = '';
  const overview = document.createElement('button');
  overview.innerHTML = `<span class="code">${fcode}</span><em>Faculty Overview</em><span class="cnt">(${(fdata.faculty_list||[]).length})</span>`;
  overview.onclick = () => selectQsFacultyOverview(fdata, overview);
  $subjects.appendChild(overview);
  Object.values(fdata.subjects || {}).sort((a, b) => a.name_en.localeCompare(b.name_en)).forEach(s => {
    const b = document.createElement('button');
    b.innerHTML = `<span class="code">${s.qs_code}</span>${s.name_en}<span class="cnt">(${s.list.length})</span>`;
    b.onclick = () => selectQsSubject(fdata.name_en, s, b);
    $subjects.appendChild(b);
  });
  selectQsFacultyOverview(fdata, overview);
}
function selectQsFacultyOverview(fdata, btn) {
  [...$('subjects').children].forEach(c => c.setAttribute('aria-selected', c === btn));
  _subjectRerender = () => renderQsFacultyOverview(fdata);
  renderQsFacultyOverview(fdata);
}
function renderQsFacultyOverview(fdata) {
  document.body.classList.toggle('qs-details', showScores && SEL.subject.source === 'qs');
  const list = fdata.faculty_list || [];
  const scoreHead = showScores ? '<th class="right">Score</th>' : '';
  const body = list.map(r => `
    <tr><td class="rank">#${r.rank_2026}${rankDelta(r.rank_2026, r.rank_2025)}</td>
      <td class="inst">${r.institution}</td>
      ${showScores ? `<td class="score">${fmt(r.overall_score)}${scoreBar(r.overall_score, 100)}</td>` : ''}</tr>`).join('');
  $('detail').innerHTML = `
    <div class="loc">◆ ${fdata.name_en} · Faculty Overview</div>
    <h2>${fdata.name_en}</h2>
    <div class="detail-toolbar" style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <p class="count" style="margin:0">${list.length} mainland China institutions · QS 2026</p>
      ${scoreToggleBtn()}
    </div>
    <div class="faculty-note">Faculty-level aggregate ranking</div>
    <table><thead><tr><th class="center">Rank 2026</th><th>Institution</th>${scoreHead}</tr></thead>
      <tbody>${body}</tbody></table>`;
  wireSubjectToggle();
}
const QS_SUBJ_COLS = { academic: ['Academic','academic_score'], employer: ['Employer','employer_score'],
  citations: ['Citations','citations_score'], h_index: ['H-Index','h_index_score'], irn: ['IRN','irn_score'] };
function activeQsCols(w) { const all = Object.keys(QS_SUBJ_COLS); return w ? all.filter(k => (w[k]||0) > 0) : all; }
function selectQsSubject(facultyName, s, btn) {
  [...$('subjects').children].forEach(c => c.setAttribute('aria-selected', c === btn));
  _subjectRerender = () => renderQsSubjectDetail(facultyName, s);
  renderQsSubjectDetail(facultyName, s);
}
function renderQsSubjectDetail(facultyName, s) {
  document.body.classList.toggle('qs-details', showScores && SEL.subject.source === 'qs');
  $('detail').innerHTML = renderQsSubjectTable(facultyName, s);
  wireSubjectToggle();
}
function renderQsSubjectTable(facultyName, s) {
  const list = s.list || [], w = s.weights || {}, cols = activeQsCols(w);
  // Indicator columns + Score appear only when scores are toggled on.
  const heads = showScores
    ? cols.map(k => `<th class="score-detail">${QS_SUBJ_COLS[k][0]}</th>`).join('') + '<th class="score-detail">Score</th>'
    : '';
  let anyEst = false;
  const body = list.map(r => {
    const val = r.overall_score, est = r.estimated === true;
    if (showScores && est && val != null) anyEst = true;
    let cells = '';
    if (showScores) {
      cells = cols.map(k => {
        const v = r[QS_SUBJ_COLS[k][1]]; return `<td class="score-detail">${fmt(v)}${scoreBar(v, 100)}</td>`;
      }).join('');
      const txt = val == null ? '—' : (est ? '≈' + val.toFixed(1) : val.toFixed(1));
      cells += `<td class="score${est ? ' est' : ''}">${txt}${scoreBar(val, 100)}</td>`;
    }
    return `<tr><td class="rank">#${r.rank_2026}${rankDelta(r.rank_2026, r.rank_2025)}</td>
      <td class="inst">${r.institution}</td>${cells}</tr>`;
  }).join('');
  return `
    <div class="loc">◆ ${s.qs_code} · ${facultyName}</div>
    <h2>${s.name_en}</h2>
    <div class="detail-toolbar" style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <p class="count" style="margin:0">${list.length} mainland China institutions · QS 2026</p>
      ${scoreToggleBtn()}
    </div>
    ${anyEst ? '<p class="est-note">≈ Estimated — overall score computed from the published indicator weights (QS publishes an official overall score only for top-ranked institutions).</p>' : ''}
    <div class="table-scroll"><table>
      <thead><tr><th class="center">Rank 2026</th><th>Institution</th>${heads}</tr></thead>
      <tbody>${body}</tbody></table></div>`;
}

// ── US News subject ──
function renderUsNav(D) {
  const cats = D.categories;
  const $nav = $('nav');
  Object.entries(cats).forEach(([code, cat], i) => {
    const b = document.createElement('button');
    const n = Object.keys(cat.subjects || {}).length;
    b.innerHTML = `${cat.name_en}<span class="subj-count">(${n})</span>`;
    b.onclick = () => selectUsCat(cat, b);
    $nav.appendChild(b);
    if (i === 0) selectUsCat(cat, b);
  });
}
function selectUsCat(cat, btn) {
  [...$('nav').children].forEach(c => c.setAttribute('aria-selected', c === btn));
  const $subjects = $('subjects'); $subjects.innerHTML = '';
  Object.values(cat.subjects || {}).sort((a, b) => a.name_en.localeCompare(b.name_en)).forEach(s => {
    const b = document.createElement('button');
    b.innerHTML = `${s.name_en}<span class="cnt">(${s.list.length})</span>`;
    b.onclick = () => selectUsSubject(cat.name_en, s, b);
    $subjects.appendChild(b);
  });
  $('detail').innerHTML = '<p class="placeholder">Select a subject to view rankings.</p>';
  const first = $subjects.querySelector('button');
  if (first) first.click();
}
function selectUsSubject(catName, s, btn) {
  [...$('subjects').children].forEach(c => c.setAttribute('aria-selected', c === btn));
  _subjectRerender = () => renderUsSubjectDetail(catName, s);
  renderUsSubjectDetail(catName, s);
}
function renderUsSubjectDetail(catName, s) {
  document.body.classList.remove('qs-details');   // single score column — no widening
  const scoreHead = showScores ? '<th class="right">Subject Score</th>' : '';
  const body = (s.list || []).map(r => `
    <tr><td class="rank">#${r.subject_rank}${r.rank_tied ? '<span class="delta same" title="tied">=</span>' : ''}</td>
      <td class="inst">${r.institution}${r.city ? `<small>${r.city}</small>` : ''}</td>
      <td class="num">${r.global_rank ? '#' + r.global_rank : '—'}</td>
      ${showScores ? `<td class="score">${fmt(r.subject_score)}${scoreBar(r.subject_score, 100)}</td>` : ''}</tr>`).join('');
  $('detail').innerHTML = `
    <div class="loc">◆ ${catName} · U.S. News 2026–2027</div>
    <h2>${s.name_en}</h2>
    <div class="detail-toolbar" style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <p class="count" style="margin:0">${(s.list||[]).length} mainland China institutions · U.S. News subject ranking</p>
      ${scoreToggleBtn()}
    </div>
    <div class="table-scroll"><table>
      <thead><tr><th class="center">Subject Rank</th><th>Institution</th>
        <th class="right">Global Rank</th>${scoreHead}</tr></thead>
      <tbody>${body}</tbody></table></div>`;
  wireSubjectToggle();
}
</script>
